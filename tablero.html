const iso = (d) => d.toISOString().slice(0, 10);
const initials = (name) => {
  const words = name.replace(/^(Ofl|Insp|Aux|aux|Subcrio|Inspector|Ofl My|Ofl 1ro|Crio)\s+/gi, '').trim().split(/\s+/);
  return ((words[0]?.[0] || '') + (words[words.length - 1]?.[0] || '')).toUpperCase();
};

// Puntos = Inicio(1) + Cierre(1) + Cada Dispositivo Finalizado(1)
const SCORE = { inicio: 1, cierre: 1, disp: 1 };

function computeAll(events, referenceDate) {
  const peritoEv = events.filter((e) => e.tipo !== 'recepcion');
  const judEv    = events.filter((e) => e.tipo === 'recepcion');
  const peritoNames = [...new Set(peritoEv.map((e) => e.sender))];
  const judNames = [...new Set(judEv.map((e) => e.sender))];

  const today = referenceDate;
  const hoyStr = iso(today);
  const startOfMonth = iso(new Date(today.getFullYear(), today.getMonth(), 1));

  const stats = peritoNames.map((name) => {
    const mine = peritoEv.filter((e) => e.sender === name);
    const mineMes = mine.filter((e) => e.fecha >= startOfMonth);
    
    const inicios = mineMes.filter((e) => e.tipo === 'inicio').length;
    const finals  = mineMes.filter((e) => e.tipo === 'finalizacion');
    
    const dispTotal = finals.reduce((acc, e) => acc + (e.dispositivos || 0), 0);
    const puntos = (inicios * SCORE.inicio) + (finals.length * SCORE.cierre) + (dispTotal * SCORE.disp);
    
    const sumariosUnicos = new Set(mineMes.map((e) => e.sumario).filter(Boolean)).size;
    const hoy = mine.filter((e) => e.fecha === hoyStr).length;

    const dias = new Set(mine.map((e) => e.fecha));
    let racha = 0;
    const cursor = new Date(today);
    while (dias.has(iso(cursor))) { racha++; cursor.setDate(cursor.getDate() - 1); }

    return { 
      nombre: name, inicial: initials(name), 
      inicios, finals: finals.length, hoy, puntos, 
      sumariosUnicos, dispositivos: dispTotal, racha 
    };
  }).sort((a, b) => b.puntos - a.puntos || b.dispositivos - a.dispositivos);

  const judStats = judNames.map((name) => {
    const mine = judEv.filter((e) => e.sender === name);
    return {
      nombre: name, inicial: initials(name),
      mes: mine.filter((e) => e.fecha >= startOfMonth).length,
      total: mine.length,
    };
  }).sort((a, b) => b.mes - a.mes);

  const daily = [...new Set(peritoEv.map((e) => e.fecha))].sort().map((f) => {
    const day = peritoEv.filter((e) => e.fecha === f);
    const d = new Date(f + 'T12:00:00');
    return {
      fecha: f, label: `${d.getDate()}/${d.getMonth() + 1}`,
      inicios: day.filter((e) => e.tipo === 'inicio').length,
      finals:  day.filter((e) => e.tipo === 'finalizacion').length,
    };
  });

  const totalHoy = peritoEv.filter((e) => e.fecha === hoyStr).length;
  const totalMes = peritoEv.filter((e) => e.fecha >= startOfMonth).length;
  const rachaLider = stats.reduce((m, p) => (p.racha > (m?.racha || 0) ? p : m), stats[0]);
  const recientes = [...peritoEv].sort((a, b) => (b.fecha + b.hora).localeCompare(a.fecha + a.hora)).slice(0, 10);

  return { peritoEv, judEv, stats, judStats, daily, recientes, totalHoy, totalMes, rachaLider };
}

function Svg({ size = 16, color, fill = 'none', sw = 2, children }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={color || 'currentColor'}
         strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" style={{ display: 'inline-block', verticalAlign: 'middle' }}>
      {children}
    </svg>
  );
}

function StackedBars({ data, height = 240 }) {
  const containerRef = useRef(null);
  const [w, setW] = useState(800);
  useEffect(() => {
    const update = () => { if (containerRef.current) setW(containerRef.current.clientWidth); };
    update(); window.addEventListener('resize', update); return () => window.removeEventListener('resize', update);
  }, []);

  const pad = { t: 10, r: 10, b: 30, l: 32 };
  const chartW = Math.max(100, w - pad.l - pad.r);
  const chartH = height - pad.t - pad.b;
  const max = Math.max(1, ...data.map((d) => d.inicios + d.finals));
  const slot = chartW / Math.max(1, data.length);
  const barW = Math.min(30, slot * 0.7);

  return (
    <div ref={containerRef} className="w-full">
      <svg width={w} height={height}>
        {[0, 1, 2, 3, 4].map((i) => {
          const y = pad.t + chartH - (chartH * i) / 4;
          return <line key={i} x1={pad.l} y1={y} x2={w - pad.r} y2={y} stroke={C.border} />;
        })}
        {data.map((d, i) => {
          const cx = pad.l + slot * (i + 0.5);
          const iniH = (d.inicios / (max*1.1)) * chartH;
          const finH = (d.finals / (max*1.1)) * chartH;
          return (
            <g key={i}>
              <rect x={cx-barW/2} y={pad.t+chartH-iniH} width={barW} height={iniH} fill={C.sage} />
              <rect x={cx-barW/2} y={pad.t+chartH-iniH-finH} width={barW} height={finH} fill={C.gold} rx="2" />
              <text x={cx} y={height-8} textAnchor="middle" fontSize="9" fill={C.mute}>{d.label}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

                    <td className="py-4 px-4">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold" style={{ background: (RANK_COLORS[i] || C.mute)+'20', color: RANK_COLORS[i] || C.mute, border: `1px solid ${RANK_COLORS[i] || C.mute}40` }}>{p.inicial}</div>
                        <span className="text-sm font-medium">{p.nombre}</span>
                      </div>
                    </td>
                    <td className="py-4 px-4 text-sm" style={{ color: C.sage, fontFamily: fonts.mono }}>{p.inicios}</td>
                    <td className="py-4 px-4 text-sm" style={{ color: C.gold, fontFamily: fonts.mono }}>{p.finals}</td>
                    <td className="py-4 px-4 text-sm" style={{ color: C.blue, fontFamily: fonts.mono }}>{p.dispositivos}</td>
                    <td className="py-4 px-4 text-sm" style={{ color: C.textDim, fontFamily: fonts.mono }}>{p.sumariosUnicos}</td>
                    <td className="py-4 px-4 text-right text-2xl font-bold" style={{ fontFamily: fonts.serif, color: RANK_COLORS[i] || C.text }}>{p.puntos}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </section>

        {/* GRÁFICO */}
        <section className="mb-16">
          <div className="flex items-center gap-4 mb-6">
            <span className="text-xs" style={{ fontFamily: fonts.mono, color: C.mute }}>02</span>
            <h2 className="text-3xl" style={{ fontFamily: fonts.serif }}>Actividad Diaria</h2>
          </div>
          <div className="p-8 border rounded-sm" style={{ borderColor: C.border, background: C.card }}>
            <StackedBars data={daily} />
            <div className="mt-6 flex gap-6 text-[9px] uppercase tracking-widest" style={{ fontFamily: fonts.mono, color: C.mute }}>
              <div className="flex items-center gap-2"><div className="w-2 h-2" style={{ background: C.sage }} /> Inicios</div>
              <div className="flex items-center gap-2"><div className="w-2 h-2" style={{ background: C.gold }} /> Finalizaciones</div>
            </div>
          </div>
        </section>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
          {/* RECIENTES */}
          <section>
            <div className="flex items-center gap-4 mb-6">
              <span className="text-xs" style={{ fontFamily: fonts.mono, color: C.mute }}>03</span>
              <h2 className="text-3xl" style={{ fontFamily: fonts.serif }}>Últimos Movimientos</h2>
            </div>
            <div className="border rounded-sm overflow-hidden" style={{ borderColor: C.border, background: C.card }}>
              {recientes.map((e, i) => (
                <div key={i} className="p-4 border-b last:border-0 flex items-center gap-4" style={{ borderColor: C.border }}>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-bold truncate">{e.sender}</div>
                    <div className="text-[10px] text-mute uppercase flex gap-2" style={{ fontFamily: fonts.mono }}>
                      <span style={{ color: e.tipo === 'inicio' ? C.sage : C.gold }}>{e.tipo}</span>
                      <span>SUM {e.sumario || '—'}</span>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-[10px]" style={{ fontFamily: fonts.mono, color: C.mute }}>{e.fecha}</div>
                    <div className="text-[9px] font-bold" style={{ color: C.blue }}>{e.dispositivos} EQ</div>
                  </div>
                </div>
              ))}
            </div>
          </section>

          {/* JUDICIALES */}
          <section>
            <div className="flex items-center gap-4 mb-6">
              <span className="text-xs" style={{ fontFamily: fonts.mono, color: C.mute }}>04</span>
              <h2 className="text-3xl" style={{ fontFamily: fonts.serif }}>Judiciales / Recepción</h2>
            </div>
            <div className="p-6 border rounded-sm" style={{ borderColor: C.border, background: C.card }}>
              {judStats.map((j, i) => (
                <div key={i} className="mb-4 last:mb-0">
                  <div className="flex justify-between text-sm mb-1">
                    <span>{j.nombre}</span>
                    <span style={{ fontFamily: fonts.mono }}>{j.mes}</span>
                  </div>
                  <div className="h-1 bg-white/5 rounded-full overflow-hidden">
                    <div className="h-full" style={{ background: C.blue, width: `${(j.mes / (judStats[0]?.mes || 1)) * 100}%` }} />
                  </div>
                </div>
              ))}
            </div>
          </section>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TableroPeritos />);
</script>
</body>
</html>
