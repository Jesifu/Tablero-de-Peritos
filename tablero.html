,{"fecha":"2026-04-20","hora":"15:00","sender":"Horacio Lopez","tipo":"inicio","sumario":"220313/2026","dispositivos":4},{"fecha":"2026-04-20","hora":"15:09","sender":"Walter Ponce","tipo":"inicio","sumario":"238025/2026","dispositivos":3},{"fecha":"2026-04-20","hora":"16:48","sender":"Guido Orellana","tipo":"finalizacion","sumario":"85170/2026","dispositivos":3},{"fecha":"2026-04-20","hora":"16:49","sender":"Karen Trepowski","tipo":"inicio","sumario":"248189/2026","dispositivos":1},{"fecha":"2026-04-20","hora":"18:42","sender":"Karen Trepowski","tipo":"inicio","sumario":"248550/2026","dispositivos":2},{"fecha":"2026-04-20","hora":"18:50","sender":"Walter Ponce","tipo":"finalizacion","sumario":"238025/2026","dispositivos":3},{"fecha":"2026-04-21","hora":"07:20","sender":"Flavia Romero","tipo":"finalizacion","sumario":"203771/2026","dispositivos":1},{"fecha":"2026-04-21","hora":"07:29","sender":"Flavia Romero","tipo":"inicio","sumario":"241284/2026","dispositivos":3},{"fecha":"2026-04-21","hora":"08:39","sender":"Evelyn Ramos","tipo":"inicio","sumario":"241122/2026","dispositivos":3},{"fecha":"2026-04-21","hora":"11:27","sender":"Cintia Sandoval","tipo":"inicio","sumario":"213847/2026","dispositivos":2},{"fecha":"2026-04-21","hora":"13:26","sender":"Santiago Pociello","tipo":"inicio","sumario":"241132/2026","dispositivos":8},{"fecha":"2026-04-21","hora":"16:26","sender":"Alejandro Capellini","tipo":"inicio","sumario":"250722/2026","dispositivos":1},{"fecha":"2026-04-21","hora":"17:14","sender":"Cintia Sandoval","tipo":"finalizacion","sumario":"213847/2026","dispositivos":2},{"fecha":"2026-04-21","hora":"18:06","sender":"Alejandro Capellini","tipo":"finalizacion","sumario":"250722/2026","dispositivos":1},{"fecha":"2026-04-21","hora":"18:58","sender":"Alejandro Capellini","tipo":"inicio","sumario":"251264/2026","dispositivos":1},{"fecha":"2026-04-21","hora":"19:50","sender":"Flavia Romero","tipo":"finalizacion","sumario":"241284/2026","dispositivos":3}];
const GENERATED_AT = "2026-04-21 22:30";

/* ══════════════════════════════════════════════════════════
   ESTILOS Y COLORES
   ══════════════════════════════════════════════════════════ */
const C = {
  bg: '#100f0d', card: '#1a1815', border: '#2b2721', gold: '#d4a256', silver: '#b8b4ad', bronze: '#b87333', 
  sage: '#9fab85', crimson: '#c8383e', text: '#f4ebdb', mute: '#7a7163', blue: '#7a9bb0'
};
const RANK_COLORS = [C.gold, C.silver, C.bronze, C.sage, C.blue, C.mute];

/* ══════════════════════════════════════════════════════════
   LÓGICA DE NEGOCIO
   ══════════════════════════════════════════════════════════ */
const iso = (d) => d.toISOString().slice(0, 10);
const initials = (name) => name.split(' ').map(n => n[0]).join('').toUpperCase();

function computeAll(events) {
  const peritoEv = events.filter(e => e.tipo !== 'recepcion');
  const judEv    = events.filter(e => e.tipo === 'recepcion');
  const names = [...new Set(peritoEv.map(e => e.sender))];
  const refDate = new Date("2026-04-21T23:59:59");
  const startOfMonth = iso(new Date(refDate.getFullYear(), refDate.getMonth(), 1));

  const stats = names.map(name => {
    const mine = peritoEv.filter(e => e.sender === name);
    const mineMes = mine.filter(e => e.fecha >= startOfMonth);
    const inicios = mineMes.filter(e => e.tipo === 'inicio').length;
    const finals  = mineMes.filter(e => e.tipo === 'finalizacion');
    
    const dispTotal = finals.reduce((acc, e) => acc + (e.dispositivos || 0), 0);
    const puntos = (inicios * 1) + (finals.length * 1) + (dispTotal * 1);
    
    // Racha
    const dias = new Set(mine.map(e => e.fecha));
    let racha = 0; const cursor = new Date(refDate);
    while (dias.has(iso(cursor))) { racha++; cursor.setDate(cursor.getDate() - 1); }

    return { nombre: name, inicial: initials(name), inicios, finals: finals.length, dispositivos: dispTotal, puntos, racha };
  }).sort((a, b) => b.puntos - a.puntos || b.dispositivos - a.dispositivos);

  return { stats, peritoEv, judEv, totalHoy: peritoEv.filter(e => e.fecha === iso(refDate)).length };
}

/* ══════════════════════════════════════════════════════════
   APP COMPONENT
   ══════════════════════════════════════════════════════════ */
function App() {
  const { stats, peritoEv, totalHoy } = useMemo(() => computeAll(SEED_EVENTS), []);
  const top3 = stats.slice(0, 3);
  const others = stats.slice(3);
  const recientes = [...peritoEv].sort((a, b) => (b.fecha + b.hora).localeCompare(a.fecha + a.hora)).slice(0, 8);

  const fonts = { serif: "'Instrument Serif', serif", mono: "'JetBrains Mono', monospace" };

  return (

      <div className="grain" />
      
      <header className="mb-16 flex flex-wrap items-end justify-between gap-8 border-b pb-8" style={{ borderColor: C.border }}>
        <div>

            Tablero <span style={{ color: C.gold }}>DAYPT</span>
          </h1>
          <p className="mt-4 text-xs uppercase tracking-[0.3em]" style={{ color: C.mute, fontFamily: fonts.mono }}>
            Análisis y Pericias Tecnológicas · {GENERATED_AT}
          </p>
        </div>
        <div className="text-right">
          <div className="text-5xl" style={{ fontFamily: fonts.serif }}>{totalHoy}</div>
          <div className="text-[10px] uppercase tracking-widest" style={{ color: C.mute }}>Actividad Hoy</div>
        </div>
      </header>

      {/* PODIO */}
      <section className="mb-20">
        <div className="flex items-baseline gap-4 mb-10">
          <span className="text-xs" style={{ fontFamily: fonts.mono, color: C.mute }}>01</span>
          <h2 className="text-4xl" style={{ fontFamily: fonts.serif }}>Podio del Mes</h2>
        </div>
        
        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
          {/* Segundo Puesto */}
          <PodiumCard perito={top3[1]} rank={2} color={C.silver} font={fonts} height="h-64" />
          {/* Primero Puesto */}
          <PodiumCard perito={top3[0]} rank={1} color={C.gold} font={fonts} height="h-80" />
          {/* Tercer Puesto */}
          <PodiumCard perito={top3[2]} rank={3} color={C.bronze} font={fonts} height="h-56" />
        </div>
      </section>

      {/* RESTO DE LA CLASIFICACIÓN */}
      <section className="grid grid-cols-1 lg:grid-cols-3 gap-16">
        <div className="lg:col-span-2">
          <div className="flex items-baseline gap-4 mb-8">
            <span className="text-xs" style={{ fontFamily: fonts.mono, color: C.mute }}>02</span>
            <h2 className="text-3xl" style={{ fontFamily: fonts.serif }}>Clasificación General</h2>
          </div>
          <table className="w-full text-left">
            <thead>
              <tr className="text-[10px] uppercase tracking-widest border-b" style={{ borderColor: C.border, color: C.mute, fontFamily: fonts.mono }}>
                <th className="py-4">#</th>
                <th className="py-4">Perito</th>
                <th className="py-4">Inic.</th>
                <th className="py-4">Final.</th>
                <th className="py-4">Equipos</th>
                <th className="py-4 text-right">Pts</th>
              </tr>
            </thead>
            <tbody>
              {stats.map((p, i) => (
                <tr key={i} className="border-b" style={{ borderColor: C.border }}>
                  <td className="py-4 text-xs" style={{ fontFamily: fonts.mono, color: RANK_COLORS[i] || C.mute }}>{i+1}</td>
                  <td className="py-4">
                    <div className="flex items-center gap-3">
                      <div className="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold border" 
                           style={{ borderColor: (RANK_COLORS[i] || C.mute)+'40', color: RANK_COLORS[i] || C.mute }}>
                        {p.inicial}
                      </div>
                      <span className="text-sm">{p.nombre}</span>
                    </div>
                  </td>
                  <td className="py-4 text-xs" style={{ color: C.sage }}>{p.inicios}</td>
                  <td className="py-4 text-xs" style={{ color: C.gold }}>{p.finals}</td>
                  <td className="py-4 text-xs" style={{ color: C.blue }}>{p.dispositivos}</td>
                  <td className="py-4 text-right text-xl font-bold" style={{ fontFamily: fonts.serif }}>{p.puntos}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {/* ÚLTIMOS MOVIMIENTOS */}
        <aside>
          <div className="flex items-baseline gap-4 mb-8">
            <span className="text-xs" style={{ fontFamily: fonts.mono, color: C.mute }}>03</span>
            <h2 className="text-3xl" style={{ fontFamily: fonts.serif }}>Recientes</h2>
          </div>
          <div className="space-y-4">
            {recientes.map((e, i) => (
              <div key={i} className="p-4 border rounded-sm flex justify-between items-center" style={{ borderColor: C.border, background: C.card }}>
                <div>
                  <div className="text-xs font-bold">{e.sender}</div>
                  <div className="text-[10px] uppercase mt-1" style={{ color: e.tipo === 'inicio' ? C.sage : C.gold, fontFamily: fonts.mono }}>
                    {e.tipo} · SUM {e.sumario || '—'}
                  </div>
                </div>
                <div className="text-[10px] font-bold" style={{ color: C.blue, fontFamily: fonts.mono }}>
                  {e.dispositivos} EQ
                </div>
              </div>
            ))}
          </div>
        </aside>
      </section>
    </div>
  );
}

function PodiumCard({ perito, rank, color, font, height }) {
  if (!perito) return null;
  return (
    <div className={`relative flex flex-col justify-end p-6 border rounded-sm transition-transform hover:-translate-y-2 ${height}`}
         style={{ background: C.card, borderColor: color + '40' }}>
      <div className="absolute top-4 left-4 text-5xl opacity-20 font-bold" style={{ color }}>{rank}</div>
      <div className="text-center mb-6">
        <div className="w-16 h-16 mx-auto rounded-full flex items-center justify-center text-xl font-bold border-2 mb-4"
             style={{ borderColor: color, color }}>
          {perito.inicial}
        </div>
        <div className="text-xl font-bold truncate">{perito.nombre}</div>
      </div>
      <div className="flex justify-between items-end border-t pt-4" style={{ borderColor: C.border }}>
        <div>
          <div className="text-xs uppercase" style={{ color: C.mute, fontFamily: font.mono }}>Puntos</div>
          <div className="text-4xl font-bold" style={{ color, fontFamily: font.serif }}>{perito.puntos}</div>
        </div>
        <div className="text-right">
          <div className="text-[10px] font-bold" style={{ color: C.blue, fontFamily: font.mono }}>{perito.dispositivos} EQUIPOS</div>
          <div className="text-[10px] uppercase" style={{ color: C.mute, fontFamily: font.mono }}>{perito.racha}d racha</div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
