<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tablero de Peritos — DAYPT</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { background: #100f0d; color: #f4ebdb; font-family: 'Manrope', sans-serif; }
  .grain { pointer-events: none; position: fixed; inset: 0; opacity: 0.03; mix-blend-mode: overlay; background-image: url("data:image/svg+xml;... (grain)"); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useMemo } = React;

const SEED_EVENTS = __EVENTS_JSON__;
const GENERATED_AT = "__GENERATED_AT__";

const C = { bg: '#100f0d', gold: '#d4a256', silver: '#b8b4ad', bronze: '#b87333', sage: '#9fab85', blue: '#7a9bb0' };

function computeAll(events) {
  const peritoEv = events.filter(e => e.tipo !== 'recepcion');
  const names = [...new Set(peritoEv.map(e => e.sender))];
  
  // Usamos la fecha del último mensaje como "hoy" para el cálculo
  const lastEvent = events[events.length - 1];
  const refDateStr = lastEvent ? lastEvent.fecha : "2026-04-21";
  const startOfMonth = refDateStr.slice(0, 8) + "01";

  const stats = names.map(name => {
    const mine = peritoEv.filter(e => e.sender === name);
    const mineMes = mine.filter(e => e.fecha >= startOfMonth);
    const inicios = mineMes.filter(e => e.tipo === 'inicio').length;
    const finals  = mineMes.filter(e => e.tipo === 'finalizacion');
    
    // PUNTOS: 1 por cada inicio + 1 por cada cierre + 1 por cada equipo cerrado
    const dispTotal = finals.reduce((acc, e) => acc + (e.dispositivos || 0), 0);
    const puntos = (inicios * 1) + (finals.length * 1) + (dispTotal * 1);

    return { 
      nombre: name, 
      inicial: name.split(' ').map(n => n[0]).join('').toUpperCase(),
      inicios, 
      finals: finals.length, 
      dispositivos: dispTotal, 
      puntos 
    };
  }).sort((a, b) => b.puntos - a.puntos || b.dispositivos - a.dispositivos);

  return { stats, recientes: peritoEv.slice(-8).reverse() };
}

function App() {
  const { stats, recientes } = useMemo(() => computeAll(SEED_EVENTS), []);
  const top3 = stats.slice(0, 3);

  return (
    <div className="max-w-7xl mx-auto p-6 md:p-12">
      <header className="mb-12 border-b border-white/10 pb-8 flex justify-between items-end">
        <div>
          <h1 className="text-7xl font-serif" style={{ fontFamily: 'Instrument Serif' }}>Tablero <span style={{ color: C.gold }}>DAYPT</span></h1>
          <p className="text-[10px] uppercase tracking-widest mt-2 opacity-50">Generado: {GENERATED_AT}</p>
        </div>
      </header>

      {/* PODIO RESTAURADO */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16 items-end">
        {/* Puesto 2 */}
        <div className="bg-[#1a1815] p-6 rounded-sm border-t-4 border-[#b8b4ad] h-56 flex flex-col justify-between">
           <span className="text-4xl opacity-20 font-bold">2</span>
           <div className="text-center font-serif text-2xl">{top3[1]?.nombre || "—"}</div>
           <div className="text-center text-4xl font-bold" style={{ color: C.silver }}>{top3[1]?.puntos || 0} <span className="text-xs uppercase">pts</span></div>
        </div>
        {/* Puesto 1 */}
        <div className="bg-[#1a1815] p-8 rounded-sm border-t-8 border-[#d4a256] h-72 flex flex-col justify-between shadow-2xl">
           <span className="text-5xl opacity-20 font-bold">1</span>
           <div className="text-center font-serif text-3xl text-white">{top3[0]?.nombre || "—"}</div>
           <div className="text-center text-6xl font-bold" style={{ color: C.gold }}>{top3[0]?.puntos || 0} <span className="text-sm uppercase">pts</span></div>
        </div>
        {/* Puesto 3 */}
        <div className="bg-[#1a1815] p-6 rounded-sm border-t-2 border-[#b87333] h-48 flex flex-col justify-between">
           <span className="text-3xl opacity-20 font-bold">3</span>
           <div className="text-center font-serif text-xl">{top3[2]?.nombre || "—"}</div>
           <div className="text-center text-3xl font-bold" style={{ color: C.bronze }}>{top3[2]?.puntos || 0} <span className="text-xs uppercase">pts</span></div>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
        {/* TABLA DETALLADA */}
        <div className="lg:col-span-2">
          <h2 className="text-2xl font-serif mb-6">Clasificación General</h2>
          <table className="w-full text-left">
            <thead className="text-[10px] uppercase opacity-50 border-b border-white/10">
              <tr><th className="pb-4">Perito</th><th>Inic.</th><th>Final.</th><th>Equipos</th><th className="text-right">Pts</th></tr>
            </thead>
            <tbody className="text-sm">
              {stats.map((p, i) => (
                <tr key={i} className="border-b border-white/5">
                  <td className="py-4 font-bold">{p.nombre}</td>
                  <td className="py-4" style={{ color: C.sage }}>{p.inicios}</td>
                  <td className="py-4" style={{ color: C.gold }}>{p.finals}</td>
                  <td className="py-4" style={{ color: C.blue }}>{p.dispositivos}</td>
                  <td className="py-4 text-right font-bold text-lg">{p.puntos}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        
        {/* RECIENTES */}
        <div>
          <h2 className="text-2xl font-serif mb-6">Recientes</h2>
          <div className="space-y-3">
            {recientes.map((e, i) => (
              <div key={i} className="bg-[#1a1815] p-4 rounded-sm border border-white/5 flex justify-between items-center">
                <div className="text-xs uppercase">
                  <div className="font-bold">{e.sender}</div>
                  <div className={e.tipo === 'inicio' ? 'text-green-500' : 'text-amber-500'}>{e.tipo}</div>
                </div>
                <div className="text-right font-mono text-[10px] opacity-50">
                  <div>{e.dispositivos} EQUIPOS</div>
                  <div>SUM {e.sumario}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
